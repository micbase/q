<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#1E40AF"/>
  <!-- Queue stack: 3 items, slightly offset to suggest depth -->
  <rect x="10" y="7" width="15" height="4" rx="1.5" fill="rgba(255,255,255,0.35)"/>
  <rect x="8"  y="12" width="15" height="4" rx="1.5" fill="rgba(255,255,255,0.6)"/>
  <!-- Main foreground item -->
  <rect x="6"  y="17" width="20" height="8" rx="2" fill="white"/>
  <!-- Inbox arrow pointing down into tray -->
  <path d="M16 19 L16 23 M13.5 21 L16 23.5 L18.5 21" stroke="#1E40AF" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
